version: '3'
services:
  airflow:
    build: .
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Bangkok
    volumes:
      - ./dags:/opt/airflow/dags
      - ./assets/.env:/opt/airflow/assets/.env
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: standalone
